name: MLOps Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  train-and-build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        mkdir -p models

    - name: Train Model
      env:
        PYTHONPATH: src
      run: |
        python src/train.py

    - name: Build Docker Image
      run: |
        docker build -t mlops-housing .